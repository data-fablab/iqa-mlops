# promtool test rules deploy/prometheus/rules/iqa_drift_proxy.test.yml
rule_files:
  - iqa_drift_proxy.rules.yml

evaluation_interval: 15s

tests:
  - interval: 15s
    input_series:
      - series: 'iqa_prediction_total{scenario_id="drift_domain_extension",decision="Rouge"}'
        values: "0+1x20"
      - series: 'iqa_prediction_total{scenario_id="drift_domain_extension",decision="Vert"}'
        values: "0+0x20"
    alert_rule_test:
      - eval_time: 3m
        alertname: IqaDriftProxy
        exp_alerts:
          - exp_labels:
              severity: critical
              signal: drift_proxy
            exp_annotations:
              summary: "Drift de domaine detecte (proxy taux d'anomalies)"
              description: "Le taux d'anomalies du regime drift depasse le seuil calibre (0.5) - domaine OOD. Doit declencher le reentrainement iqa_lifecycle."

  - interval: 15s
    input_series:
      - series: 'iqa_prediction_total{scenario_id="drift_domain_extension",decision="Vert"}'
        values: "0+1x20"
    alert_rule_test:
      - eval_time: 3m
        alertname: IqaDriftProxy
        exp_alerts: []

  - interval: 15s
    input_series:
      - series: 'iqa_prediction_total{scenario_id="production_replay_natural",decision="Rouge"}'
        values: "0+1x20"
    alert_rule_test:
      - eval_time: 3m
        alertname: IqaDriftProxy
        exp_alerts: []
