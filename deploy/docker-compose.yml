services:
  iqa-api:
    image: iqa-serving:local
    build:
      context: ..
      target: serving
    command: iqa-api
    env_file: ../.env
    environment:
      IQA_INFERENCE_URL: http://iqa-inference:8100
      # Real inference: iqa-api delegates /predict over HTTP to the GPU iqa-inference
      # service (real Feature-AE reconstruction on the actual image) instead of the
      # in-process synthetic domain scorer. Set to 0 to fall back to the placeholder.
      IQA_REAL_INFERENCE: ${IQA_REAL_INFERENCE:-1}
      # Live drift state read by the deterministic domain scorer (demo): the
      # orchestrator drives per-class bands here so decisions recover to Vert
      # once a retrain has covered the class.
      IQA_DRIFT_STATE_FILE: /var/iqa/drift/state.json
    ports: ["8000:8000"]
    volumes:
      # Host src mounted so the scorer picks up changes without a rebuild.
      - ../src:/app/src:ro
      # Orchestrator-driven drift state (host-writable bind mount).
      - ./drift-state:/var/iqa/drift
    depends_on: [iqa-inference, postgres]

  iqa-inference:
    image: iqa-ml:local
    build:
      context: ..
      target: ml
    command: iqa-inference
    env_file: ../.env
    environment:
      IQA_GPU_LOCK_PATH: /var/run/iqa-gpu/gpu.lock
      IQA_GPU_DEMO_HOLD: ${IQA_GPU_DEMO_HOLD:-0}
      # Real Feature-AE reconstruction scoring on the GPU (reverse-distillation
      # student-teacher) instead of the synthetic placeholder. The baseline
      # checkpoint is trained on Casting_class1, so OOD class2/class3 images
      # reconstruct poorly -> high anomaly score -> Orange/Rouge.
      IQA_REAL_INFERENCE: ${IQA_REAL_INFERENCE:-1}
      IQA_INFERENCE_DEVICE: ${IQA_INFERENCE_DEVICE:-cuda}
      # Active checkpoint: refreshed in place by the lifecycle (Issue 23/24);
      # defaults to the class1-only baseline so a fresh stack boots cleanly.
      IQA_FEATURE_AE_CHECKPOINT: ${IQA_FEATURE_AE_CHECKPOINT:-/opt/iqa/models/rd_feature_ae_active/checkpoint.pt}
      IQA_DOMAIN_DRIFT_DIR: ${IQA_DOMAIN_DRIFT_DIR:-/opt/iqa/models/patchcore_domain_drift_active}
      # Calibrated reconstruction thresholds (ADR 0010 §3) are the source of truth;
      # the env thresholds below are only a fallback when the file is absent.
      IQA_FEATURE_AE_CALIBRATION: ${IQA_FEATURE_AE_CALIBRATION:-/opt/iqa/iqa-mlops/configs/feature_ae_reconstruction_calibration.yaml}
      IQA_FEATURE_AE_THRESHOLD_ORANGE: ${IQA_FEATURE_AE_THRESHOLD_ORANGE:-0.02}
      IQA_FEATURE_AE_THRESHOLD_RED: ${IQA_FEATURE_AE_THRESHOLD_RED:-0.05}
    ports: ["8100:8100"]
    volumes:
      - gpu_lock:/var/run/iqa-gpu
      # Live src so the real scorer picks up changes without a rebuild.
      - ../src:/app/src:ro
      # Calibrated reconstruction thresholds, read by RealFeatureAEScorer.
      - ../configs:/opt/iqa/iqa-mlops/configs:ro
      # Real checkpoints (host .cache) -> baseline + retrained candidates.
      - ../.cache/iqa/models:/opt/iqa/models:ro
      # Real casting images so the scorer reads actual pixels (same dataset the
      # GPU trainer uses; the host path is a junction Docker can't follow, so we
      # bind the real external dataset directly).
      - ${IQA_DATASET_HOST_PATH:-../data/raw/hss-iad}:/opt/iqa/iqa-mlops/data/raw/hss-iad:ro
      - torch_hub_cache:/root/.cache/torch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  iqa-streamlit:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir streamlit==1.40.* requests && streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    env_file: ../.env
    environment:
      IQA_API_URL: http://iqa-api:8000
      # Browser-facing API base used for embedded heatmap images (the user's browser
      # fetches them, so it must be the published host, not the in-cluster name).
      IQA_API_PUBLIC_URL: http://localhost:8000
      IQA_REPO_ROOT: /workspace
    ports: ["8501:8501"]
    volumes:
      - ./streamlit:/app:ro
      - ..:/workspace:ro
    depends_on: [iqa-api]

  iqa-ingestion:
    image: iqa-data:local
    build:
      context: ..
      target: data
    command: iqa-run-ingestion
    env_file: ../.env
    profiles: ["batch"]

  iqa-replay:
    image: iqa-data:local
    build:
      context: ..
      target: data
    command: iqa-run-replay
    env_file: ../.env
    profiles: ["batch"]

  iqa-trainer:
    image: iqa-ml:local
    build:
      context: ..
      target: ml
    command: iqa-run-lifecycle
    env_file: ../.env
    environment:
      IQA_GPU_LOCK_PATH: /var/run/iqa-gpu/gpu.lock
    profiles: ["batch"]
    volumes:
      - gpu_lock:/var/run/iqa-gpu

  iqa-monitoring:
    image: iqa-data:local
    build:
      context: ..
      target: data
    command: iqa-run-monitoring
    env_file: ../.env
    profiles: ["batch"]

  iqa-dvc-gate:
    build:
      context: ..
      target: dvc-gate
    image: iqa-dvc-gate:local
    command: iqa-check-dvc-reproducibility
    env_file: ../.env
    profiles: ["batch"]

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: iqa-airflow:local
    entrypoint: /bin/bash
    command:
      - "-c"
      - >-
        airflow db migrate &&
        airflow pools import /opt/airflow/pools.json &&
        airflow users create --role Admin --username "$${IQA_AIRFLOW_API_USER}"
        --password "$${IQA_AIRFLOW_API_PASSWORD}" --firstname iqa --lastname admin
        --email admin@iqa.local || true
    env_file: ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${IQA_POSTGRES_USER:-iqa}:${IQA_POSTGRES_PASSWORD:-iqa_password}@postgres:5432/airflow
      IQA_AIRFLOW_API_USER: ${IQA_AIRFLOW_API_USER:-airflow}
      IQA_AIRFLOW_API_PASSWORD: ${IQA_AIRFLOW_API_PASSWORD:-airflow}
    volumes:
      - ./airflow/pools.json:/opt/airflow/pools.json:ro
      - ../airflow/dags:/opt/airflow/dags:ro
    depends_on: [postgres]

  airflow-webserver:
    image: iqa-airflow:local
    command: webserver
    env_file: ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${IQA_POSTGRES_USER:-iqa}:${IQA_POSTGRES_PASSWORD:-iqa_password}@postgres:5432/airflow
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      # Allow the drift sensor (issue 05) to query dagRuns via basic auth, while
      # keeping the browser session backend for the UI.
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      IQA_IMAGE_DATA: ${IQA_IMAGE_DATA:-iqa-data:local}
      IQA_IMAGE_ML: ${IQA_IMAGE_ML:-iqa-ml:local}
      IQA_IMAGE_DVC: ${IQA_IMAGE_DVC:-iqa-dvc-gate:local}
      MLFLOW_TRACKING_URI: ${IQA_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      # Expose iqa.dags.operators (factory) without installing the metier runtime.
      PYTHONPATH: /opt/iqa/src
    ports: ["8080:8080"]
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - ../src:/opt/iqa/src:ro
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    image: iqa-airflow:local
    command: scheduler
    env_file: ../.env
    # Access to the host Docker daemon to launch task containers (ADR 0008).
    # IQA_DOCKER_GID must match the host docker group (`getent group docker`).
    group_add:
      - "${IQA_DOCKER_GID:-984}"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${IQA_POSTGRES_USER:-iqa}:${IQA_POSTGRES_PASSWORD:-iqa_password}@postgres:5432/airflow
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      PYTHONPATH: /opt/iqa/src
      # Containerised-task backend (ADR 0008): task containers join iqa_net so
      # they resolve postgres/minio/mlflow/iqa-inference by name.
      IQA_AIRFLOW_BACKEND: docker
      IQA_DOCKER_NETWORK: iqa_net
      IQA_GPU_LOCK_VOLUME: iqa_gpu_lock
      IQA_IMAGE_DATA: ${IQA_IMAGE_DATA:-iqa-data:local}
      IQA_IMAGE_ML: ${IQA_IMAGE_ML:-iqa-ml:local}
      IQA_IMAGE_DVC: ${IQA_IMAGE_DVC:-iqa-dvc-gate:local}
      MLFLOW_TRACKING_URI: ${IQA_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      # Drift sensor (issue 05): reads the shared IqaDriftProxy rule via the
      # Prometheus query API and guards re-trigger via the Airflow REST API.
      IQA_PROMETHEUS_URL: ${IQA_PROMETHEUS_URL:-http://prometheus:9090}
      IQA_AIRFLOW_API_URL: ${IQA_AIRFLOW_API_URL:-http://airflow-webserver:8080/api/v1}
      IQA_AIRFLOW_API_USER: ${IQA_AIRFLOW_API_USER:-airflow}
      IQA_AIRFLOW_API_PASSWORD: ${IQA_AIRFLOW_API_PASSWORD:-airflow}
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - ../src:/opt/iqa/src:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  statsd-exporter:
    image: prom/statsd-exporter:v0.28.0
    command: ["--statsd.listen-udp=:9125", "--web.listen-address=:9102"]
    expose: ["9102", "9125"]

  # Model-quality exporter (Issue 1 tracer bullet): reads the latest AUPIMO per
  # (model_version, stage) from MLflow's iqa-model-quality experiment and exposes
  # it as a Prometheus gauge. Runs via `python -m` against the mounted src so a
  # rebuild is not required to pick up the new module.
  model-quality-exporter:
    image: iqa-ml:local
    command: python -m iqa.monitoring.model_quality_exporter --port 9105
    env_file: ../.env
    environment:
      MLFLOW_TRACKING_URI: ${IQA_MLFLOW_TRACKING_URI:-http://mlflow:5000}
    ports: ["9105:9105"]
    volumes:
      - ../src:/app/src:ro
    depends_on: [mlflow]

  mlflow:
    # Pinned by digest: ghcr publishes mlflow only under :latest, so we freeze
    # the exact manifest instead of a moving tag (run `docker manifest inspect`
    # to read the version, bump the digest when upgrading deliberately).
    image: ghcr.io/mlflow/mlflow@sha256:45bdcc9439dac5c51c160a863e3c1cadae1757de9d6d1b9403e0a648a6f2333b
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${IQA_POSTGRES_USER:-iqa}:${IQA_POSTGRES_PASSWORD:-iqa_password}@postgres:5432/mlflow --default-artifact-root s3://mlflow-artifacts --allowed-hosts ${IQA_MLFLOW_ALLOWED_HOSTS:-localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000}
    env_file: ../.env
    ports: ["5000:5000"]
    depends_on: [postgres, minio]

  minio:
    # Pinned by digest (MinIO uses moving RELEASE.* / latest tags upstream).
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    env_file: ../.env
    environment:
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  minio-init:
    # Pinned by digest (MinIO client uses moving RELEASE.* / latest tags).
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    env_file: ../.env
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
      - ./minio/lifecycle-heatmaps.json:/lifecycle-heatmaps.json:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    depends_on: [minio]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${IQA_POSTGRES_USER:-iqa}
      POSTGRES_PASSWORD: ${IQA_POSTGRES_PASSWORD:-iqa_password}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro

  # Lightweight web SQL client to browse the Postgres databases (iqa_metadata,
  # mlflow, airflow). Dev-only convenience: connect with server "postgres",
  # user/password from IQA_POSTGRES_USER/PASSWORD. UI on http://localhost:8090.
  adminer:
    image: adminer:4.8.1
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports: ["8090:8080"]
    depends_on: [postgres]

  prometheus:
    image: prom/prometheus:v3.1.0
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    depends_on: [statsd-exporter, alertmanager]

  alertmanager:
    image: prom/alertmanager:v0.28.0
    ports: ["9093:9093"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Slack webhook URL kept out of the repo (gitignored); read via api_url_file.
      - ./alertmanager/secrets:/etc/alertmanager/secrets:ro
    depends_on: [webhook-catcher, mailpit]

  # Faux SMTP local (decision 8 : alerte visible, zero secret externe). Alertmanager
  # envoie les emails ici ; la boite de reception est consultable sur http://localhost:8025.
  mailpit:
    image: axllent/mailpit:v1.21
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports: ["8025:8025"]
    expose: ["1025"]

  # Webhook catcher local : rend l'alerte visible (décision 8), stdlib only.
  webhook-catcher:
    image: python:3.12-slim
    working_dir: /app
    command: python catcher.py
    expose: ["8080"]
    volumes:
      - ./webhook-catcher:/app:ro

  grafana:
    image: grafana/grafana:11.4.0
    env_file: ../.env
    ports: ["3000:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning

  reverse-proxy:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [iqa-api, iqa-streamlit, mlflow, minio, grafana, airflow-webserver]

volumes:
  minio_data:
  postgres_data:
  torch_hub_cache:
  # Stable name so sibling task containers launched by the scheduler can mount
  # the single-GPU lock by volume name (factory: IQA_GPU_LOCK_VOLUME).
  gpu_lock:
    name: iqa_gpu_lock

networks:
  # Fixed network name so DockerOperator task containers join it (network_mode)
  # and resolve service names (postgres/minio/mlflow/iqa-inference).
  default:
    name: iqa_net
