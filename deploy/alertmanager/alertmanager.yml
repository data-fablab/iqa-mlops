# Alertmanager — notifications des alertes Prometheus.
#
# Routage par severite (decision 8 : alerte visible ; le sensor Airflow lit la
# serie ALERTS via Prometheus, PAS ce chemin de notification — decision 1) :
#   - warning  (IqaDriftProxyWarning) -> webhook-catcher + email
#   - critical (IqaDriftProxy)        -> webhook-catcher + email + Slack
#
# Email : SMTP local Mailpit (mailpit:1025), boite visible sur http://localhost:8025.
# Aucune dependance externe, aucun secret.
# Slack : webhook entrant, lu depuis un fichier monte (api_url_file) pour garder
# le secret hors du depot (deploy/alertmanager/secrets/slack_webhook_url, gitignore).
global:
  resolve_timeout: 2m
  smtp_smarthost: mailpit:1025
  smtp_from: alertmanager@iqa.local
  smtp_require_tls: false

route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 1m
  routes:
    # Drift confirme (critique) : escalade email + Slack en plus du webhook.
    - matchers:
        - severity="critical"
      receiver: critical

receivers:
  # Defaut (warning et tout le reste) : webhook local + email.
  - name: default
    webhook_configs:
      - url: http://webhook-catcher:8080/alert
        send_resolved: true
    email_configs:
      - to: oncall@iqa.local
        send_resolved: true
        headers:
          subject: '[IQA][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'

  # Critique : webhook + email + Slack.
  - name: critical
    webhook_configs:
      - url: http://webhook-catcher:8080/alert
        send_resolved: true
    email_configs:
      - to: oncall@iqa.local
        send_resolved: true
        headers:
          subject: '[IQA][CRITICAL] {{ .CommonLabels.alertname }} — drift confirme'
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_url
        channel: '#iqa-alertes'
        send_resolved: true
        title: '[IQA][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}{{ .Annotations.summary }}
          — {{ .Annotations.description }}
          {{ end }}
