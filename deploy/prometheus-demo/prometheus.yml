global:
  scrape_interval: 5s
  # Demo-fast: evaluate alerting rules every 5s instead of the default 60s so the
  # drift alert state (pending->firing) tracks the live ratio in near real time.
  # Only the TIMING changes vs the reference config; the 0.5 threshold is identical.
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: iqa-api
    metrics_path: /metrics
    static_configs:
      - targets: ["iqa-api:8000"]

  - job_name: iqa-inference
    metrics_path: /metrics
    static_configs:
      - targets: ["iqa-inference:8100"]

  - job_name: airflow
    metrics_path: /metrics
    static_configs:
      - targets: ["statsd-exporter:9102"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: model-quality-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["model-quality-exporter:9105"]
