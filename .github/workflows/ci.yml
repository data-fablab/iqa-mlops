name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra cpu

      - name: Lint
        run: uv run --extra cpu ruff check src scripts tests

      - name: Test
        run: uv run --extra cpu pytest -q
