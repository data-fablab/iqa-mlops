name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Role extras (ADR 0007): fastapi=serving, scikit-learn=ml, psycopg=data.
      # The full suite imports all three, so install them to collect/run it.
      - name: Sync dependencies
        run: uv sync --extra cpu --extra serving --extra ml --extra data

      - name: Lint
        run: uv run --extra cpu --extra serving --extra ml --extra data ruff check src scripts tests

      - name: Test
        run: uv run --extra cpu --extra serving --extra ml --extra data pytest -q

  api-and-dag-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Airflow (mlops) so the DAGs are importable instead of skipped; role extras
      # (serving/ml/data) so the API + lifecycle_tasks imports resolve (ADR 0007).
      - name: Sync dependencies (cpu + mlops + roles)
        run: uv sync --extra cpu --extra mlops --extra serving --extra ml --extra data

      - name: API contracts
        run: uv run --extra cpu --extra mlops --extra serving --extra ml --extra data pytest tests/api tests/contracts -q

      # Real "zero broken DAG" check: parse the DAGs via DagBag (import_errors is
      # populated without a metadata DB). Excludes docker_contract tests, which
      # require a live Airflow runtime + initialized DB (run in the Docker image).
      - name: Import Airflow DAGs (zero broken DAG)
        run: |
          uv run --extra cpu --extra mlops --extra serving --extra ml --extra data python - <<'PY'
          from airflow.models import DagBag

          bag = DagBag(dag_folder="airflow/dags", include_examples=False)
          assert not bag.import_errors, bag.import_errors
          for dag_id in ["iqa_ingestion", "iqa_replay", "iqa_lifecycle", "iqa_monitoring", "iqa_dvc_reproducibility"]:
              assert dag_id in bag.dag_ids, f"missing DAG: {dag_id}"
          print("DAGs OK:", sorted(bag.dag_ids))
          PY

      - name: Airflow DAG unit checks
        run: uv run --extra cpu --extra mlops --extra serving --extra ml --extra data pytest tests/airflow -q -m "not docker_contract"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build application image (cpu)
        run: docker build --build-arg IQA_UV_EXTRA=cpu -t iqa-app:ci .

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose -f deploy/docker-compose.yml config -q
          rm -f .env
