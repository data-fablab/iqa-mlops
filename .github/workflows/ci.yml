name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra cpu

      - name: Lint
        run: uv run --extra cpu ruff check src scripts tests

      - name: Test
        run: uv run --extra cpu pytest -q

  api-and-dag-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Airflow (mlops extra) so the DAGs are importable instead of skipped.
      - name: Sync dependencies (cpu + mlops)
        run: uv sync --extra cpu --extra mlops

      - name: API contracts
        run: uv run --extra cpu --extra mlops pytest tests/api tests/contracts -q

      - name: Import Airflow DAGs (zero broken DAG)
        run: uv run --extra cpu --extra mlops pytest tests/airflow -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build application image (cpu)
        run: docker build --build-arg IQA_UV_EXTRA=cpu -t iqa-app:ci .

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose -f deploy/docker-compose.yml config -q
          rm -f .env
