name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Role extras (ADR 0007): fastapi=serving, scikit-learn=ml, psycopg=data.
      # The full suite imports all three, so install them to collect/run it.
      - name: Sync dependencies
        run: uv sync --extra cpu --extra serving --extra ml --extra data

      - name: Lint
        run: uv run --extra cpu --extra serving --extra ml --extra data ruff check src scripts tests

      - name: Test
        run: uv run --extra cpu --extra serving --extra ml --extra data pytest -q

  api-and-dag-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Airflow (mlops) so the DAGs are importable instead of skipped; role extras
      # (serving/ml/data) so the API + lifecycle_tasks imports resolve (ADR 0007).
      - name: Sync dependencies (cpu + mlops + roles)
        run: uv sync --extra cpu --extra mlops --extra serving --extra ml --extra data

      - name: API contracts
        run: uv run --extra cpu --extra mlops --extra serving --extra ml --extra data pytest tests/api tests/contracts -q

      # Real "zero broken DAG" check: parse the DAGs via DagBag (import_errors is
      # populated without a metadata DB). Excludes docker_contract tests, which
      # require a live Airflow runtime + initialized DB (run in the Docker image).
      - name: Import Airflow DAGs (zero broken DAG)
        run: |
          uv run --extra cpu --extra mlops --extra serving --extra ml --extra data python - <<'PY'
          from airflow.models import DagBag

          bag = DagBag(dag_folder="airflow/dags", include_examples=False)
          assert not bag.import_errors, bag.import_errors
          for dag_id in ["iqa_ingestion", "iqa_replay", "iqa_lifecycle", "iqa_monitoring", "iqa_dvc_reproducibility"]:
              assert dag_id in bag.dag_ids, f"missing DAG: {dag_id}"
          print("DAGs OK:", sorted(bag.dag_ids))
          PY

      - name: Airflow DAG unit checks
        run: uv run --extra cpu --extra mlops --extra serving --extra ml --extra data pytest tests/airflow -q -m "not docker_contract"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build application image (cpu)
        run: docker build --build-arg IQA_UV_EXTRA=cpu -t iqa-app:ci .

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose -f deploy/docker-compose.yml config -q
          rm -f .env

  publish-images:
    # Build and push the per-role images (serving/ml/data) to Docker Hub with
    # immutable tags (git SHA + version tag on v* releases; never `latest`).
    # Opt-in: enable by setting the IQA_PUBLISH_IMAGES=true repo variable and the
    # DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets. Skipped on PRs and when off,
    # so the pipeline stays green before the registry is wired (ADR 0008).
    needs: [lint-and-test, api-and-dag-contracts, docker-build]
    if: github.event_name == 'push' && vars.IQA_PUBLISH_IMAGES == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: serving
            image: iqa-serving
          - target: ml
            image: iqa-ml
          - target: data
            image: iqa-data
          - target: dvc-gate
            image: iqa-dvc-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute immutable tags (never latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.IQA_IMAGE_REGISTRY || 'data-fablab' }}/${{ matrix.image }}
          # git SHA for every push; the version on v* tags (matches IQA_IMAGE_TAG
          # used by docker-compose.prod.yml). flavor latest=false -> no floating tag.
          tags: |
            type=sha,format=long
            type=ref,event=tag
          flavor: latest=false

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
